# wm.vcec.cloud — reverse proxy to the Next.js frontend (PM2 on :3000).
# Cloudflare terminates TLS in front; this origin listens on :80.

# Restore the real client IP from Cloudflare (so the app's rate-limiter and
# X-Forwarded-For see the visitor, not a Cloudflare edge address).
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

server {
    listen 80;
    listen [::]:80;
    server_name wm.vcec.cloud;

    client_max_body_size 6m;   # avatar uploads (max 5 MB)

    # Serve user-uploaded avatars from disk — `next start` does not serve files
    # written into public/ at runtime.
    location /uploads/ {
        alias /opt/football-betting/frontend/public/uploads/;
        access_log off;
        expires 7d;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}

# Reject direct/origin access with a non-matching Host (keep origin Cloudflare-only).
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name wm.vcec.cloud;
    ssl_certificate     /etc/ssl/certs/wm.vcec.cloud.crt;
    ssl_certificate_key /etc/ssl/private/wm.vcec.cloud.key;
    client_max_body_size 6m;

    # Serve user-uploaded avatars from disk — `next start` does not serve files
    # written into public/ at runtime.
    location /uploads/ {
        alias /opt/football-betting/frontend/public/uploads/;
        access_log off;
        expires 7d;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;
    ssl_certificate     /etc/ssl/certs/wm.vcec.cloud.crt;
    ssl_certificate_key /etc/ssl/private/wm.vcec.cloud.key;
    return 444;
}
